<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#0a0a0a"/>
  <!-- Makeup brush - academia de maquillaje -->
  <g transform="translate(64,64) rotate(-30)">
    <!-- Brush bristles -->
    <path d="M-8,-42 Q0,-52 8,-42 L6,-28 Q0,-24 -6,-28 Z" fill="#e91e7a"/>
    <!-- Ferrule (metal band) -->
    <rect x="-7" y="-28" width="14" height="8" rx="2" fill="#c9a84c"/>
    <!-- Handle -->
    <rect x="-5" y="-20" width="10" height="48" rx="3" fill="#c9a84c"/>
    <!-- Handle detail -->
    <rect x="-5" y="20" width="10" height="8" rx="2" fill="#e0c36a"/>
    <!-- Paint drop -->
    <circle cx="12" cy="-38" r="5" fill="#ff3d9a" opacity="0.8"/>
  </g>
</svg>
